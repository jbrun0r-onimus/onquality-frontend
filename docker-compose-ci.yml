services:
  web:
    container_name: onquality-front-deploy
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_AUTH_API_BASE_URL: ${VITE_AUTH_API_BASE_URL}
        VITE_USE_MOCK_SERVER: ${VITE_USE_MOCK_SERVER}
    ports:
      - '${APP_PORT:-8080}:80'
